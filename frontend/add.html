<h2>Add Student</h2>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">

<button onclick="addStudent()">Add</button>

<script>
function addStudent() {
    fetch('http://localhost:3000/students', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            name: name.value,
            age: age.value
        })
    });
}
</script>
